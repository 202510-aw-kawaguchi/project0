<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Support AI</title>
  <style>
    :root {
      --bg: #eef3f9;
      --panel: #ffffff;
      --line: #d8e2ef;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0b69ff;
      --primary-soft: #dbeafe;
      --received: #f3f6fb;
      --sent: #0b69ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(900px 420px at -5% -5%, #dbeafe 0%, transparent 60%), radial-gradient(900px 420px at 105% 105%, #dcfce7 0%, transparent 60%), var(--bg);
      font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
      color: var(--text);
      padding: 16px;
    }
    .chat-container {
      width: min(100%, 860px);
      height: min(92vh, 860px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 22px 50px rgba(15, 23, 42, 0.14);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }
    .chat-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(180deg, #ffffff, #f7fbff);
    }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #c7d7f5;
      flex: 0 0 auto;
    }
    .user-name { margin: 0; font-size: 1rem; }
    .user-status { font-size: 0.82rem; color: var(--muted); }
    .user-status::before { content: "●"; color: #22c55e; margin-right: 4px; }
    .chat-messages {
      padding: 16px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: linear-gradient(180deg, #f9fbff, #f4f8ff 45%, #f8fbff);
    }
    .date-divider {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .message {
      max-width: 86%;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .message.received { align-self: flex-start; }
    .message.sent { align-self: flex-end; }
    .bubble {
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .received .bubble {
      background: var(--received);
      border: 1px solid #dbe6f5;
    }
    .sent .bubble {
      background: var(--sent);
      color: #fff;
    }
    .meta {
      margin-top: 4px;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .suggestion-btn {
      border: 1px solid #bfd4ff;
      background: var(--primary-soft);
      color: #1e3a8a;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .chat-input-area {
      border-top: 1px solid var(--line);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      background: #fff;
    }
    .message-input {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 12px;
      font-size: 0.95rem;
      outline: none;
    }
    .message-input:focus {
      border-color: #8ab4ff;
      box-shadow: 0 0 0 3px rgba(11, 105, 255, 0.16);
    }
    .send-btn {
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      width: 92px;
      font-weight: 600;
      cursor: pointer;
    }
    .send-btn:disabled { opacity: 0.6; cursor: default; }
    @media (max-width: 560px) {
      body { padding: 0; }
      .chat-container { width: 100vw; height: 100vh; border-radius: 0; }
      .message { max-width: 94%; }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <div class="avatar"></div>
      <div>
        <h2 class="user-name">カスタマーサポートAI</h2>
        <span class="user-status">オンライン</span>
      </div>
    </header>

    <main class="chat-messages" id="chatMessages">
      <div class="date-divider">今日</div>
      <div class="message received">
        <div>
          <div class="bubble">こんにちは。お問い合わせ内容を入力してください。料金・不具合・導入の相談に対応できます。</div>
          <div class="meta">Support AI</div>
        </div>
      </div>
    </main>

    <footer class="chat-input-area">
      <input id="messageInput" class="message-input" type="text" placeholder="メッセージを入力...">
      <button id="sendBtn" class="send-btn">送信</button>
    </footer>
  </div>

  <script>
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function nowText() {
      const now = new Date();
      return String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    }

    function addMessage(text, type, meta) {
      const wrapper = document.createElement('div');
      wrapper.className = 'message ' + type;

      const inner = document.createElement('div');

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      const metaEl = document.createElement('div');
      metaEl.className = 'meta';
      metaEl.textContent = meta + ' ' + nowText();

      inner.appendChild(bubble);
      inner.appendChild(metaEl);
      wrapper.appendChild(inner);
      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addSuggestions(items) {
      if (!items || items.length === 0) return;
      const container = document.createElement('div');
      container.className = 'suggestions';

      items.forEach((item) => {
        const button = document.createElement('button');
        button.className = 'suggestion-btn';
        button.type = 'button';
        button.textContent = item;
        button.addEventListener('click', () => {
          messageInput.value = item;
          submitMessage();
        });
        container.appendChild(button);
      });

      chatMessages.appendChild(container);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function submitMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      addMessage(text, 'sent', 'You');
      messageInput.value = '';
      sendBtn.disabled = true;

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        if (!response.ok) {
          throw new Error('API error: ' + response.status);
        }

        const data = await response.json();
        addMessage(data.answer || '回答が取得できませんでした。', 'received', 'Support AI');
        addSuggestions(data.suggestions || []);
      } catch (error) {
        addMessage('通信エラーが発生しました。時間をおいて再試行してください。', 'received', 'Support AI');
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    sendBtn.addEventListener('click', submitMessage);
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitMessage();
    });
  </script>
</body>
</html>
