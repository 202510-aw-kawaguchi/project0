<script>
const STORAGE_KEY='clinicflow_tickets_v2';
const priorityMap={'緊急':'urgent','高':'high','中':'mid','低':'low'};
const statusMap={'未対応':'open','対応中':'progress','顧客返信待ち':'wait','完了':'done'};
const defaultTickets=[
{id:'t-001',priority:'緊急',status:'未対応',sla:{dueAt:'2026-02-24 12:00'},category:'術後不安',customerName:'山田',customerTag:'術後3日',maskedContact:'090-****-1234',title:'術後に出血が続く',summary:'出血継続。安全ルールにより即時の有人対応が必要。',ruleId:'SAFETY_BLEEDING',createdAt:'10:27',updatedAt:'10:35',assignee:'未割当',messages:[{role:'user',text:'術後に出血が止まりません',time:'10:25'},{role:'assistant',text:'診断はできません。至急受診をご案内します。',time:'10:27',citations:[{source:'postcare.md',snippet:'出血が続く場合は受診を優先'}]}],internalNotes:[{by:'佐藤',time:'10:33',text:'至急電話フォロー予定'}]},
{id:'t-002',priority:'高',status:'対応中',sla:{dueAt:'2026-02-24 13:30'},category:'予約変更',customerName:'佐藤',customerTag:'初診',maskedContact:'080-****-9912',title:'予約を来週木曜へ変更希望',summary:'候補日確認中。',ruleId:'HANDOFF_RESERVATION',createdAt:'10:12',updatedAt:'10:42',assignee:'佐藤',messages:[{role:'user',text:'来週木曜へ予約変更できますか？',time:'10:10'}],internalNotes:[]},
{id:'t-003',priority:'中',status:'顧客返信待ち',sla:{dueAt:'2026-02-24 18:00'},category:'施術説明',customerName:'鈴木',customerTag:'初診',maskedContact:'070-****-2251',title:'ダウンタイムの目安を知りたい',summary:'施術名確認後に個別案内が必要。',ruleId:'HANDOFF_INFO',createdAt:'09:55',updatedAt:'10:20',assignee:'鈴木',messages:[{role:'user',text:'ダウンタイムは何日ですか？',time:'09:53'}],internalNotes:[{by:'鈴木',time:'10:20',text:'顧客へ追加質問送信済み'}]},
{id:'t-004',priority:'中',status:'未対応',sla:{dueAt:'2026-02-24 16:20'},category:'料金',customerName:'田中',customerTag:'初診',maskedContact:'090-****-7752',title:'モニター価格の適用条件',summary:'キャンペーン条件確認が必要。',ruleId:'HANDOFF_PRICE',createdAt:'09:42',updatedAt:'09:42',assignee:'未割当',messages:[{role:'user',text:'モニター価格の条件を教えてください',time:'09:40'}],internalNotes:[]},
{id:'t-005',priority:'高',status:'対応中',sla:{dueAt:'2026-02-24 11:40'},category:'クレーム',customerName:'中村',customerTag:'再診',maskedContact:'080-****-0031',title:'説明と異なる請求に関する相談',summary:'請求関連クレーム。責任者対応。',ruleId:'SAFETY_COMPLAINT',createdAt:'09:20',updatedAt:'10:05',assignee:'田中',messages:[{role:'user',text:'聞いていた金額と違う',time:'09:18'}],internalNotes:[{by:'田中',time:'10:05',text:'請求履歴確認中'}]},
{id:'t-006',priority:'低',status:'完了',sla:{dueAt:'2026-02-25 10:00'},category:'予約変更',customerName:'小林',customerTag:'初診',maskedContact:'090-****-1022',title:'初回カウンセリング日程変更',summary:'希望日で調整完了。',ruleId:'HANDOFF_RESERVATION',createdAt:'08:50',updatedAt:'09:10',assignee:'佐藤',messages:[{role:'user',text:'来週に変更したいです',time:'08:48'}],internalNotes:[]},
{id:'t-007',priority:'中',status:'未対応',sla:{dueAt:'2026-02-24 17:30'},category:'その他',customerName:'高橋',customerTag:'術後1日',maskedContact:'070-****-6644',title:'薬の服用タイミングについて',summary:'術後案内資料と照合が必要。',ruleId:'HANDOFF_POSTCARE',createdAt:'08:48',updatedAt:'08:48',assignee:'未割当',messages:[{role:'user',text:'薬は食前ですか？',time:'08:46'}],internalNotes:[]},
{id:'t-008',priority:'緊急',status:'対応中',sla:{dueAt:'2026-02-24 11:20'},category:'術後不安',customerName:'伊藤',customerTag:'術後2日',maskedContact:'090-****-5122',title:'発熱がある、受診判断を相談',summary:'発熱あり。安全アラートで緊急連絡対応中。',ruleId:'SAFETY_FEVER',createdAt:'08:32',updatedAt:'10:01',assignee:'鈴木',messages:[{role:'user',text:'発熱があります。受診すべきですか？',time:'08:30'}],internalNotes:[{by:'鈴木',time:'10:01',text:'折返し連絡済み'}]},
{id:'t-009',priority:'低',status:'顧客返信待ち',sla:{dueAt:'2026-02-25 09:30'},category:'料金',customerName:'渡辺',customerTag:'初診',maskedContact:'080-****-4488',title:'分割支払い可否について',summary:'支払い方法の案内送付済み。',ruleId:'HANDOFF_PRICE',createdAt:'08:10',updatedAt:'09:02',assignee:'田中',messages:[{role:'user',text:'分割払いできますか？',time:'08:07'}],internalNotes:[]},
{id:'t-010',priority:'高',status:'未対応',sla:{dueAt:'2026-02-24 15:00'},category:'ダウンタイム',customerName:'加藤',customerTag:'施術検討中',maskedContact:'070-****-2240',title:'仕事復帰時期の相談',summary:'施術別の復帰目安を有人で調整回答。',ruleId:'HANDOFF_INFO',createdAt:'07:56',updatedAt:'07:56',assignee:'未割当',messages:[{role:'user',text:'仕事復帰は何日後が目安ですか？',time:'07:54'}],internalNotes:[]}
];
const load=()=>{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return structuredClone(defaultTickets);try{return JSON.parse(raw)}catch{return structuredClone(defaultTickets)}};
let tickets=load();
const state={view:'board',selectedTicketId:tickets[0]?.id||null,q:'',category:'',priority:'',assignee:'',deadline:''};
const $=id=>document.getElementById(id);const leftBody=$('leftBody'),detailBody=$('detailBody');
const save=()=>localStorage.setItem(STORAGE_KEY,JSON.stringify(tickets));
const nowTime=()=>{const d=new Date();return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`};
const parseDue=t=>new Date(t.sla.dueAt.replace(' ','T'));
const isOver=t=>t.status!=='完了'&&parseDue(t).getTime()<Date.now();
const pClass=p=>`p-${priorityMap[p]||'mid'}`;const sClass=s=>`s-${statusMap[s]||'open'}`;
function deadlineMatch(t,k){if(!k)return true;const due=parseDue(t),now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate()),tom=new Date(today);tom.setDate(today.getDate()+1);const eow=new Date(today);eow.setDate(today.getDate()+(7-today.getDay()));const d0=new Date(due.getFullYear(),due.getMonth(),due.getDate());if(k==='期限切れ')return isOver(t);if(k==='今日')return d0.getTime()===today.getTime();if(k==='明日')return d0.getTime()===tom.getTime();if(k==='今週')return d0>=today&&d0<=eow;return true}
function filtered(){const q=state.q.trim().toLowerCase();return tickets.filter(t=>{if(state.category&&t.category!==state.category)return false;if(state.priority&&t.priority!==state.priority)return false;if(state.assignee&&t.assignee!==state.assignee)return false;if(!deadlineMatch(t,state.deadline))return false;if(!q)return true;return [t.customerName,t.title,t.category,t.summary].join(' ').toLowerCase().includes(q)})}
function ensureSelection(list){if(!list.length){state.selectedTicketId=null;return}if(!list.some(t=>t.id===state.selectedTicketId))state.selectedTicketId=list[0].id}
function renderBoard(list){const cols=['未対応','対応中','顧客返信待ち','完了'];return `<div class="kanban">${cols.map(st=>{const items=list.filter(t=>t.status===st);return `<section class="col" data-drop-status="${st}"><div class="col-head"><span>${st}</span><span class="count">${items.length}</span></div>${items.map(t=>`<article class="ticket ${t.id===state.selectedTicketId?'active':''}" draggable="true" data-ticket-id="${t.id}"><div class="row"><span class="badge ${pClass(t.priority)}">${t.priority}</span><span class="badge cat">${t.category}</span></div><div class="meta"><strong>${t.customerName}</strong><span>${t.customerTag}</span></div><div class="title">${t.title}</div><div class="meta"><span class="due ${isOver(t)?'over':''}">期限: ${t.sla.dueAt.slice(11)}</span><span class="assignee ${t.assignee==='未割当'?'none':''}">${t.assignee==='未割当'?'?':t.assignee.slice(0,1)}</span></div></article>`).join('')}</section>`}).join('')}</div>`}
function renderTable(list){return `<div class="table-wrap"><table><thead><tr><th>優先度</th><th>顧客</th><th>タイトル</th><th>カテゴリ</th><th>担当</th><th>期限</th><th>ステータス</th></tr></thead><tbody>${list.map(t=>`<tr class="${t.id===state.selectedTicketId?'active':''}" data-ticket-id="${t.id}"><td><span class="badge ${pClass(t.priority)}">${t.priority}</span></td><td>${t.customerName}</td><td>${t.title}</td><td>${t.category}</td><td>${t.assignee}</td><td class="${isOver(t)?'due over':''}">${t.sla.dueAt}</td><td><span class="badge ${sClass(t.status)}">${t.status}</span></td></tr>`).join('')}</tbody></table></div>`}
function renderSLA(list){const now=Date.now(),over=[],soon=[],today=[];list.forEach(t=>{const diff=parseDue(t).getTime()-now;if(isOver(t))over.push(t);else if(diff<=30*60*1000)soon.push(t);else if(deadlineMatch(t,'今日'))today.push(t)});const block=(n,a,red)=>`<section class="sla-box"><div class="sla-head ${red?'red':''}">${n}<span>${a.length}</span></div>${a.length?a.map(t=>`<div class="sla-item ${t.id===state.selectedTicketId?'active':''}" data-ticket-id="${t.id}"><strong>${t.customerName}</strong> / ${t.title}<br><small>期限: ${t.sla.dueAt} | ${t.status}</small></div>`).join(''):'<div class="empty">該当なし</div>'}</section>`;return block('期限切れ',over,true)+block('期限まで30分以内',soon,false)+block('本日中',today,false)}
function renderLeft(){const list=filtered();ensureSelection(list);if(!list.length){leftBody.innerHTML='<div class="empty">条件に一致するチケットがありません。</div>';return}leftBody.innerHTML=state.view==='board'?renderBoard(list):state.view==='table'?renderTable(list):renderSLA(list);bindLeft()}
function renderDetail(){const t=tickets.find(x=>x.id===state.selectedTicketId);if(!t){detailBody.innerHTML='<div class="empty">チケットを選択してください。</div>';return}const safety=t.ruleId.startsWith('SAFETY');const msgs=t.messages.map(m=>`<div class="msg ${m.role}"><div>${m.text}</div><div class="msg-time">${m.time}</div>${m.citations?`<details class="cite"><summary>引用ソース</summary>${m.citations.map(c=>`<div class="cite-item"><strong>${c.source}</strong>: ${c.snippet}</div>`).join('')}</details>`:''}</div>`).join('');const notes=t.internalNotes.length?t.internalNotes.map(n=>`<div class="cite-item"><strong>${n.by}</strong> ${n.time}: ${n.text}</div>`).join(''):'<div class="cite-item">内部メモはまだありません。</div>';detailBody.innerHTML=`<div class="detail-head"><h3 class="detail-title">${t.title}</h3><div class="row"><span class="badge ${pClass(t.priority)}">${t.priority}</span><span class="badge ${sClass(t.status)}">${t.status}</span></div><div class="detail-meta">ID: ${t.id} / 作成: ${t.createdAt} / 更新: ${t.updatedAt}</div>${safety?`<div class="alert"><strong>安全アラート:</strong> ${t.ruleId}</div>`:''}<div class="summary"><strong>AI要約:</strong> ${t.summary}</div></div><div class="customer"><strong>${t.customerName}さま</strong>（${t.customerTag}）<br>連絡先: ${t.maskedContact}<br>カテゴリ: <span class="badge cat">${t.category}</span></div><div class="msgs">${msgs}</div><div class="panel"><div class="row"><select id="assigneeSel"><option>未割当</option><option>佐藤</option><option>鈴木</option><option>田中</option></select><select id="prioritySel"><option>緊急</option><option>高</option><option>中</option><option>低</option></select><select id="statusSel"><option>未対応</option><option>対応中</option><option>顧客返信待ち</option><option>完了</option></select></div><div class="row"><button class="btn" data-template="ご希望日時を確認のうえ、予約候補をご案内します。">テンプレ返信: 予約提案</button><button class="btn" data-template="料金の目安をご案内します。正式なお見積は来院時に確定します。">テンプレ返信: 料金案内</button><button class="btn warn" data-template="安全のため早めの受診をご案内します。ご都合の良い時間を教えてください。">テンプレ返信: 受診誘導（安全）</button></div><div class="row"><textarea id="replyInput" placeholder="返信文を入力（モック）"></textarea></div><div class="row"><button class="btn primary" id="sendReplyBtn">送信（モック）</button><button class="btn success" id="doneBtn">完了にする</button></div><div class="row"><input id="memoInput" type="text" placeholder="内部メモを入力" style="flex:1;"><button class="btn" id="addMemoBtn">内部メモ追加</button></div><details class="cite"><summary>内部メモ</summary>${notes}</details><div class="links" style="margin-top:10px;"><a href="#">顧客詳細へ</a><a href="/inbox.html">受信トレイで会話を開く</a><a href="#">ナレッジに追加</a></div></div>`;bindDetail(t)}
function bindLeft(){leftBody.querySelectorAll('[data-ticket-id]').forEach(el=>el.addEventListener('click',()=>{state.selectedTicketId=el.dataset.ticketId;renderAll()}));leftBody.querySelectorAll('.ticket').forEach(card=>card.addEventListener('dragstart',e=>e.dataTransfer.setData('text/plain',card.dataset.ticketId)));leftBody.querySelectorAll('.col').forEach(col=>{col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag')});col.addEventListener('dragleave',()=>col.classList.remove('drag'));col.addEventListener('drop',e=>{e.preventDefault();col.classList.remove('drag');const id=e.dataTransfer.getData('text/plain');const t=tickets.find(x=>x.id===id);if(!t)return;t.status=col.dataset.dropStatus;t.updatedAt=nowTime();save();renderAll()})})}
function bindDetail(t){const ass=$('assigneeSel'),pri=$('prioritySel'),st=$('statusSel');ass.value=t.assignee;pri.value=t.priority;st.value=t.status;ass.addEventListener('change',()=>{t.assignee=ass.value;t.updatedAt=nowTime();save();renderAll()});pri.addEventListener('change',()=>{t.priority=pri.value;t.updatedAt=nowTime();save();renderAll()});st.addEventListener('change',()=>{t.status=st.value;t.updatedAt=nowTime();save();renderAll()});const reply=$('replyInput');detailBody.querySelectorAll('[data-template]').forEach(b=>b.addEventListener('click',()=>{reply.value=b.dataset.template;reply.focus()}));$('sendReplyBtn').addEventListener('click',()=>{const text=reply.value.trim();if(!text)return;t.messages.push({role:'staff',text,time:nowTime()});t.updatedAt=nowTime();if(t.status==='未対応')t.status='対応中';reply.value='';save();renderAll()});$('addMemoBtn').addEventListener('click',()=>{const m=$('memoInput');const text=m.value.trim();if(!text)return;t.internalNotes.push({by:'佐藤',time:nowTime(),text});t.updatedAt=nowTime();m.value='';save();renderAll()});$('doneBtn').addEventListener('click',()=>{t.status='完了';t.updatedAt=nowTime();save();renderAll()})}
function renderAll(){renderLeft();renderDetail()}
$('viewTabs').addEventListener('click',e=>{const b=e.target.closest('[data-view]');if(!b)return;state.view=b.dataset.view;document.querySelectorAll('#viewTabs .tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderAll()});
$('qFilter').addEventListener('input',e=>{state.q=e.target.value;renderAll()});$('categoryFilter').addEventListener('change',e=>{state.category=e.target.value;renderAll()});$('priorityFilter').addEventListener('change',e=>{state.priority=e.target.value;renderAll()});$('assigneeFilter').addEventListener('change',e=>{state.assignee=e.target.value;renderAll()});$('deadlineFilter').addEventListener('change',e=>{state.deadline=e.target.value;renderAll()});
$('resetBtn').addEventListener('click',()=>{state.q='';state.category='';state.priority='';state.assignee='';state.deadline='';['qFilter','categoryFilter','priorityFilter','assigneeFilter','deadlineFilter'].forEach(id=>$(id).value='');renderAll()});
const menu=$('menuToggle'),sidebar=$('sidebar'),overlay=$('overlay');menu.addEventListener('click',()=>{sidebar.classList.toggle('open');overlay.classList.toggle('show')});overlay.addEventListener('click',()=>{sidebar.classList.remove('open');overlay.classList.remove('show')});window.addEventListener('resize',()=>{if(window.innerWidth>992){sidebar.classList.remove('open');overlay.classList.remove('show')}});
renderAll();
</script>
</body>
</html>
