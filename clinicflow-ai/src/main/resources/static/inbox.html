    .item-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}.unread-dot{width:8px;height:8px;border-radius:50%;background:#17a2b8}.item-name{font-weight:700}.item-time{margin-left:auto;color:#6c757d;font-size:12px}

    details.citation{margin-top:8px;background:#f8f9fa;border:1px solid #e4e9ef;border-radius:8px;padding:6px 8px}details.citation summary{cursor:pointer;color:#2a6285;font-size:12px}.citation-item{font-size:12px;margin-top:6px;color:#4f5a67}
    .actions{padding:14px 16px 16px;border-top:1px solid #edf1f5;background:#fff}.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.btn{border:1px solid #d7dee6;background:#fff;border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer}.btn.primary{background:#17a2b8;border-color:#17a2b8;color:#fff}.btn.warn{background:#fff3cd;border-color:#ffc107;color:#6d5200}.btn.danger{background:#dc3545;border-color:#dc3545;color:#fff}
    .reply-box{width:100%;min-height:74px;border:1px solid #d7dee6;border-radius:8px;padding:10px;font-size:13px;resize:vertical;outline:none}.empty{padding:26px;color:#6c757d;text-align:center}

    @media(max-width:1200px){.shell{grid-template-columns:1fr}}@media(max-width:992px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.menu-toggle{display:inline-flex}.filter-controls{grid-template-columns:1fr 1fr}.header-search-wrap.open{max-width:220px}.header-search{width:210px}}@media(max-width:768px){.content{padding:16px}.breadcrumb{display:none}.filter-controls{grid-template-columns:1fr}.header-search-wrap.open{max-width:160px}.header-search{width:150px}}

<script>
const inboxItems=[{id:'c-001',unread:true,customerName:'\u5c71\u7530\u3055\u307e',customerTag:'\u8853\u5f8c3\u65e5',maskedContact:'090-****-1234',category:'\u8853\u5f8c\u4e0d\u5b89',status:'\u672a\u5bfe\u5fdc',aiDecision:'handoff',safetyAlert:true,updatedAt:'10:27',lastMessage:'\u8853\u5f8c\u306b\u51fa\u8840\u304c\u7d9a\u3044\u3066\u3044\u307e\u3059...',summary:'\u5b89\u5168\u30eb\u30fc\u30eb\u306b\u8a72\u5f53\u3002\u6709\u4eba\u5bfe\u5fdc\u3078\u30a8\u30b9\u30ab\u30ec\u30fc\u30b7\u30e7\u30f3\u304c\u5fc5\u8981\u3067\u3059\u3002',messages:[{role:'user',text:'\u8853\u5f8c\u306e\u51fa\u8840\u304c\u6b62\u307e\u308a\u307e\u305b\u3093\u3002',time:'10:25'},{role:'assistant',text:'\u5b89\u5168\u306e\u305f\u3081\u3001\u304a\u65e9\u3081\u306b\u53d7\u8a3a\u3057\u3066\u304f\u3060\u3055\u3044\u3002',time:'10:27',citations:[{source:'postcare.md',snippet:'\u51fa\u8840\u304c\u7d99\u7d9a\u3059\u308b\u5834\u5408\u306f\u53d7\u8a3a\u3092\u512a\u5148'}]}]},{id:'c-002',unread:true,customerName:'\u4f50\u85e4\u3055\u307e',customerTag:'\u521d\u8a3a',maskedContact:'080-****-9912',category:'\u4e88\u7d04\u5909\u66f4',status:'\u5bfe\u5fdc\u4e2d',aiDecision:'handoff',safetyAlert:false,updatedAt:'10:12',lastMessage:'\u6765\u9031\u6728\u66dc\u306b\u5909\u66f4\u3067\u304d\u307e\u3059\u304b\uff1f',summary:'\u7a7a\u304d\u67a0\u78ba\u8a8d\u306e\u305f\u3081\u30b9\u30bf\u30c3\u30d5\u5bfe\u5fdc\u4e2d\u3002',messages:[{role:'user',text:'\u4e88\u7d04\u3092\u5909\u66f4\u3067\u304d\u307e\u3059\u304b\uff1f',time:'10:10'}]},{id:'c-003',unread:false,customerName:'\u9234\u6728\u3055\u307e',customerTag:'\u65bd\u8853\u524d\u76f8\u8ac7',maskedContact:'070-****-2251',category:'\u65bd\u8853\u8aac\u660e',status:'\u672a\u5bfe\u5fdc',aiDecision:'needs_review',safetyAlert:false,updatedAt:'09:55',lastMessage:'\u30c0\u30a6\u30f3\u30bf\u30a4\u30e0\u306f\u4f55\u65e5\u3067\u3059\u304b\uff1f',summary:'\u30c6\u30f3\u30d7\u30ec\u56de\u7b54\u3067\u5bfe\u5fdc\u53ef\u80fd\u3002',messages:[{role:'user',text:'\u30c0\u30a6\u30f3\u30bf\u30a4\u30e0\u306f\u4f55\u65e5\u3067\u3059\u304b\uff1f',time:'09:53'}]}];
const state={selectedId:'c-001',tab:'all',category:'',status:'',query:''};
const inboxListEl=document.getElementById('inboxList');const detailRootEl=document.getElementById('detailRoot');const tabContainerEl=document.getElementById('tabContainer');const categoryFilterEl=document.getElementById('categoryFilter');const statusFilterEl=document.getElementById('statusFilter');const headerSearchEl=document.getElementById('headerSearch');
const aiLabel=t=>t==='ai_resolved'?{cls:'b-ai',text:'AI\u81ea\u52d5'}:t==='handoff'?{cls:'b-handoff',text:'\u6709\u4eba\u5bfe\u5fdc'}:{cls:'b-alert',text:'\u8981\u78ba\u8a8d'};const statusCls=s=>s==='\u5bfe\u5fdc\u4e2d'?'b-progress':s==='\u5b8c\u4e86'?'b-done':'b-open';
function filtered(){const q=state.query.trim().toLowerCase();return inboxItems.filter(i=>{if(state.tab==='unread'&&!i.unread)return false;if(state.tab==='handoff'&&i.aiDecision!=='handoff')return false;if(state.tab==='alert'&&!i.safetyAlert)return false;if(state.tab==='ai'&&i.aiDecision!=='ai_resolved')return false;if(state.category&&i.category!==state.category)return false;if(state.status&&i.status!==state.status)return false;if(q){const text=[i.customerName,i.category,i.lastMessage,...i.messages.map(m=>m.text)].join(' ').toLowerCase();if(!text.includes(q))return false}return true})}
function ensureSelection(list){if(!list.length){state.selectedId=null;return}if(!list.some(x=>x.id===state.selectedId))state.selectedId=list[0].id}
function renderList(){const list=filtered();ensureSelection(list);if(!list.length){inboxListEl.innerHTML='<div class="empty">\u6761\u4ef6\u306b\u4e00\u81f4\u3059\u308b\u554f\u3044\u5408\u308f\u305b\u306f\u3042\u308a\u307e\u305b\u3093\u3002</div>';return}inboxListEl.innerHTML=list.map(i=>{const ai=aiLabel(i.aiDecision==='needs_review'?'needs_review':i.aiDecision);return `<div class="inbox-item ${i.id===state.selectedId?'active':''}" data-id="${i.id}"><div class="item-top">${i.unread?'<span class="unread-dot"></span>':'<span style="width:8px"></span>'}<span class="item-name">${i.customerName}</span><span class="item-time">${i.updatedAt}</span></div><div class="meta-row"><span class="badge b-cat">${i.category}</span><span class="badge ${i.safetyAlert?'b-alert':ai.cls}">${i.safetyAlert?'\u5b89\u5168\u30a2\u30e9\u30fc\u30c8':ai.text}</span><span class="badge ${statusCls(i.status)}">${i.status}</span></div><div class="item-summary">${i.lastMessage}</div></div>`}).join('')}
function renderDetail(){const s=inboxItems.find(x=>x.id===state.selectedId);if(!s){detailRootEl.innerHTML='<div class="empty">\u554f\u3044\u5408\u308f\u305b\u3092\u9078\u629e\u3057\u3066\u304f\u3060\u3055\u3044\u3002</div>';return}const showAlert=s.aiDecision==='handoff'||s.safetyAlert;const msgs=s.messages.map(m=>`<div class="msg ${m.role}"><div>${m.text}</div><div class="msg-time">${m.time}</div>${m.role==='assistant'&&m.citations?`<details class="citation"><summary>\u5F15\u7528\u30BD\u30FC\u30B9</summary>${m.citations.map(c=>`<div class="citation-item"><strong>${c.source}</strong>: ${c.snippet}</div>`).join('')}</details>`:''}</div>`).join('');detailRootEl.innerHTML=`<div class="detail-head">${showAlert?`<div class="alert-banner"><strong>\u6CE8\u610F:</strong> \u6709\u4EBA\u5BFE\u5FDC\u3078\u306E\u30A8\u30B9\u30AB\u30EC\u30FC\u30B7\u30E7\u30F3\u304C\u5FC5\u8981\u3067\u3059\u3002<br>${s.summary||''}</div>`:''}<h3 class="customer-title">${s.customerName}</h3><div class="customer-meta">${s.maskedContact}</div><div class="customer-tags"><span class="badge b-cat">${s.customerTag}</span><span class="badge b-cat">\u30AB\u30C6\u30B4\u30EA: ${s.category}</span><span class="badge ${statusCls(s.status)}">${s.status}</span></div></div><div class="messages">${msgs}</div><div class="actions"><div class="action-row"><button class="btn ${showAlert?'danger':'warn'}" id="handoffBtn" type="button">\u30C1\u30B1\u30C3\u30C8\u5316\uFF08\u6709\u4EBA\u5BFE\u5FDC\u3078\uFF09</button><button class="btn" data-template="\u4E88\u7D04\u6848\u5185\u3092\u53D7\u3051\u4ED8\u3051\u307E\u3057\u305F\u3002\u5019\u88DC\u65E5\u6642\u3092\u78BA\u8A8D\u3057\u3066\u6298\u308A\u8FD4\u3057\u307E\u3059\u3002">\u30C6\u30F3\u30D7\u30EC\u8FD4\u4FE1: \u4E88\u7D04\u6848\u5185</button><button class="btn" data-template="\u6599\u91D1\u306E\u76EE\u5B89\u3092\u3054\u6848\u5185\u3057\u307E\u3059\u3002\u8A73\u7D30\u898B\u7A4D\u306F\u6765\u9662\u6642\u306B\u78BA\u5B9A\u3057\u307E\u3059\u3002">\u30C6\u30F3\u30D7\u30EC\u8FD4\u4FE1: \u6599\u91D1\u6848\u5185</button><button class="btn" data-template="\u5B89\u5168\u306E\u305F\u3081\u53D7\u8A3A\u3092\u3054\u6848\u5185\u3057\u307E\u3059\u3002\u5E0C\u671B\u6642\u9593\u5E2F\u3092\u6559\u3048\u3066\u304F\u3060\u3055\u3044\u3002">\u30C6\u30F3\u30D7\u30EC\u8FD4\u4FE1: \u53D7\u8A3A\u8A98\u5C0E</button></div><textarea id="replyBox" class="reply-box" placeholder="\u8FD4\u4FE1\u6587\u3092\u5165\u529B\uFF08\u30E2\u30C3\u30AF\uFF09"></textarea><div class="action-row" style="margin-top:10px;"><button class="btn primary" id="doneBtn" type="button">\u5B8C\u4E86\u306B\u3059\u308B</button><button class="btn" id="knowledgeBtn" type="button">\u30CA\u30EC\u30C3\u30B8\u306B\u8FFD\u52A0</button></div></div>`}
function bindList(){inboxListEl.querySelectorAll('.inbox-item').forEach(el=>el.addEventListener('click',()=>{state.selectedId=el.dataset.id;const t=inboxItems.find(x=>x.id===state.selectedId);if(t)t.unread=false;renderAll()}))}
function bindDetail(){const s=inboxItems.find(x=>x.id===state.selectedId);if(!s)return;const hb=document.getElementById('handoffBtn');if(hb)hb.addEventListener('click',()=>{s.status='\u5BFE\u5FDC\u4E2D';s.aiDecision='handoff';renderAll()});const db=document.getElementById('doneBtn');if(db)db.addEventListener('click',()=>{s.status='\u5B8C\u4E86';s.unread=false;s.updatedAt='\u4ECA';renderAll()});const kb=document.getElementById('knowledgeBtn');if(kb)kb.addEventListener('click',()=>alert('\u30CA\u30EC\u30C3\u30B8\u8FFD\u52A0\uFF08\u30E2\u30C3\u30AF\uFF09'));const reply=document.getElementById('replyBox');detailRootEl.querySelectorAll('[data-template]').forEach(btn=>btn.addEventListener('click',()=>{if(reply){reply.value=btn.dataset.template;reply.focus()}}))}
function renderAll(){renderList();renderDetail();bindList();bindDetail()}

tabContainerEl.addEventListener('click',e=>{const t=e.target.closest('[data-tab]');if(!t)return;state.tab=t.dataset.tab;tabContainerEl.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));t.classList.add('active');renderAll()});
categoryFilterEl.addEventListener('change',()=>{state.category=categoryFilterEl.value;renderAll()});statusFilterEl.addEventListener('change',()=>{state.status=statusFilterEl.value;renderAll()});headerSearchEl.addEventListener('input',()=>{state.query=headerSearchEl.value;renderAll()});
document.getElementById('resetBtn').addEventListener('click',()=>{state.tab='all';state.category='';state.status='';state.query='';categoryFilterEl.value='';statusFilterEl.value='';headerSearchEl.value='';document.getElementById('dateFrom').value='';document.getElementById('dateTo').value='';tabContainerEl.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));tabContainerEl.querySelector('[data-tab="all"]').classList.add('active');renderAll()});
const st=document.getElementById('searchToggleBtn'),sw=document.getElementById('headerSearchWrap');st.addEventListener('click',()=>{sw.classList.toggle('open');if(sw.classList.contains('open'))headerSearchEl.focus()});
const mt=document.getElementById('menuToggle'),sb=document.getElementById('sidebar'),ov=document.getElementById('overlay');mt.addEventListener('click',()=>{sb.classList.toggle('open');ov.classList.toggle('show')});ov.addEventListener('click',()=>{sb.classList.remove('open');ov.classList.remove('show')});window.addEventListener('resize',()=>{if(window.innerWidth>992){sb.classList.remove('open');ov.classList.remove('show')}});
renderAll();
</script>
</body>
</html>
