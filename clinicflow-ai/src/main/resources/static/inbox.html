<script>
const INBOX_KEY='inboxItems';
const SETTINGS_KEY='clinicflow_settings_v2';
const CATEGORY_GENERAL=['料金','施術説明','ダウンタイム/注意事項','アクセス/営業時間','その他（軽微）','その他'];
const SAFETY_WORDS=['出血','血が止まら','止血','呼吸','息が','胸が苦しい','意識','失神','激痛','強い痛み','高熱','発熱','腫れがひどい','化膿','アレルギー','じんましん','嘔吐','めまい'];
const RESERVATION_WORDS_STRONG=['予約','予約したい','予約変更','変更','キャンセル','取りたい','空き','空いて','日時','日程','何日','何時','予約できますか'];
const RESERVATION_WORDS_WEAK=['相談','カウンセリング','希望'];
const COMPLAINT_WORDS=['最悪','返金','クレーム','訴える','二度と','怒','対応が悪い','納得できない','ひどい','詐欺'];
const RESERVATION_CATEGORY_HINTS=['予約','変更','キャンセル'];
const debugMode=(new URLSearchParams(location.search)).get('debug')==='1';
const CLASS_PRIORITY={safety:1,complaint:2,reservation:3,manual_review:4,general:5};
const STATUS_PRIORITY={
  '未対応':1,'未読':1,'open':1,'new':1,
  '対応中':2,'in_progress':2,'processing':2,
  '仮受付完了':2,'reservation_completed':2,
  '顧客返信待ち':3,'waiting_customer':3,
  '完了':4,'解決済':4,'done':4,'resolved':4,'closed':4
};

const seedInboxItems=[
  {id:'c-001',customerName:'山田さま',category:'術後不安',status:'未対応',createdAt:'2026-02-24 10:25',updatedAt:'2026-02-24 10:27',messages:[{role:'user',text:'術後の出血が止まりません。',time:'10:25'}],flags:{afterHours:false,autoReplied:false,safetyAlert:true,complaint:false,reservation:false},aiMeta:null,unread:true,customerTag:'術後3日',maskedContact:'090-****-1234'},
  {id:'c-002',customerName:'佐藤さま',category:'予約変更',status:'対応中',createdAt:'2026-02-24 10:10',updatedAt:'2026-02-24 10:12',messages:[{role:'user',text:'来週木曜に予約を変更できますか？',time:'10:10'}],flags:{afterHours:false,autoReplied:false,safetyAlert:false,complaint:false,reservation:true},aiMeta:null,unread:true,customerTag:'初診',maskedContact:'080-****-9912'},
  {id:'c-003',customerName:'鈴木さま',category:'施術説明',status:'未対応',createdAt:'2026-02-24 09:53',updatedAt:'2026-02-24 09:55',messages:[{role:'user',text:'ダウンタイムは何日ですか？',time:'09:53'}],flags:{afterHours:false,autoReplied:false,safetyAlert:false,complaint:false,reservation:false},aiMeta:null,unread:false,customerTag:'施術前相談',maskedContact:'070-****-2251'},
  // demo: complaint items for verification
  {id:'c-004',customerName:'中村さま',category:'その他（軽微）',status:'未対応',createdAt:'2026-02-24 11:05',updatedAt:'2026-02-24 11:07',messages:[{role:'user',text:'対応が悪いです。最悪でした。返金してほしいです。',time:'11:05'}],flags:{afterHours:false,autoReplied:false,safetyAlert:false,complaint:false,reservation:false},aiMeta:null,unread:true,customerTag:'再診',maskedContact:'090-****-7788'},
  {id:'c-005',customerName:'高橋さま',category:'料金',status:'未対応',createdAt:'2026-02-24 11:20',updatedAt:'2026-02-24 11:21',messages:[{role:'user',text:'説明と違って納得できない。ひどい対応です。',time:'11:20'}],flags:{afterHours:false,autoReplied:false,safetyAlert:false,complaint:false,reservation:false},aiMeta:null,unread:true,customerTag:'初診',maskedContact:'080-****-3399'}
];

const state={selectedId:'',tab:'all',category:'',status:'',query:''};
let activeDropdown='';
const inboxListEl=document.getElementById('inboxList');
const detailRootEl=document.getElementById('detailRoot');
const tabContainerEl=document.getElementById('tabContainer');
const categoryFilterEl=document.getElementById('categoryFilter');
const statusFilterEl=document.getElementById('statusFilter');
const headerSearchEl=document.getElementById('headerSearch');
const dateFromEl=document.getElementById('dateFrom');
const dateToEl=document.getElementById('dateTo');

function nowHHMM(){
  const d=new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function nowISO(){
  return new Date().toISOString();
}
function loadSettings(){
  const defaults={businessHours:{start:'10:00',end:'19:00',closedDays:['Wed'],enabled:true},afterHoursMode:{enabled:true},demoNow:''};
  try{
    const raw=JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}');
    return {
      ...defaults,
      ...raw,
      businessHours:{...defaults.businessHours,...(raw.businessHours||{})},
      afterHoursMode:{...defaults.afterHoursMode,...(raw.afterHoursMode||{})}
    };
  }catch(_){
    return defaults;
  }
}
function loadInboxItems(){
  try{
    const raw=JSON.parse(localStorage.getItem(INBOX_KEY)||'null');
    if(Array.isArray(raw)&&raw.length)return raw.map(normalizeInboxItem);
  }catch(_){}
  const seeded=seedInboxItems.map(normalizeInboxItem);
  localStorage.setItem(INBOX_KEY,JSON.stringify(seeded));
  return seeded;
}
function ensureDemoComplaintItems(){
  // demo support: inject complaint test records even when localStorage already exists
  const requiredIds=['c-004','c-005'];
  const exists=new Set(inboxItems.map(i=>i.id));
  let changed=false;
  seedInboxItems
    .filter(x=>requiredIds.includes(x.id))
    .forEach(seed=>{
      if(!exists.has(seed.id)){
        inboxItems.push(normalizeInboxItem(seed));
        changed=true;
      }
    });
  if(changed) saveInboxItems();
}
function saveInboxItems(){
  localStorage.setItem(INBOX_KEY,JSON.stringify(inboxItems));
}
function normalizeInboxItem(item){
  const flags={afterHours:false,autoReplied:false,safetyAlert:false,complaint:false,reservation:false,manualReview:false,nextActionTag:'なし',...(item.flags||{})};
  if(item.safetyAlert) flags.safetyAlert=true;
  if(item.reservation) flags.reservation=true;
  if(item.complaint) flags.complaint=true;
  if(item.aiDecision==='ai_resolved') flags.autoReplied=true;
  const aiMeta=item.aiMeta||{classification:'manual_review',confidence:0.40,citations:[],model:'mock'};
  if(aiMeta.autoReplyAt==='-') delete aiMeta.autoReplyAt;
  const messages=Array.isArray(item.messages)?item.messages:[];
  return {
    id:item.id||`c-${Date.now()}`,
    customerName:item.customerName||'顧客',
    category:item.category||'その他（軽微）',
    status:item.status||'未対応',
    createdAt:item.createdAt||nowISO(),
    updatedAt:item.updatedAt||nowISO(),
    messages,
    flags,
    aiMeta,
    ticketCreated:!!item.ticketCreated,
    ticketPriority:item.ticketPriority||'',
    assignedTo:item.assignedTo||'',
    ticketDepartment:item.ticketDepartment||'',
    ticketSla:item.ticketSla||'',
    ticketId:item.ticketId||'',
    reservationFormData:item.reservationFormData||null,
    complaintSummary:item.complaintSummary||null,
    unread:typeof item.unread==='boolean'?item.unread:true,
    customerTag:item.customerTag||'一般',
    maskedContact:item.maskedContact||'---'
  };
}

function parseHM(v){const p=String(v||'00:00').split(':').map(Number);return (p[0]||0)*60+(p[1]||0);}
function formatYmd(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}${m}${day}`;
}
function generateTicketId(){
  const ymd=formatYmd(new Date());
  const re=new RegExp(`^TKT-${ymd}-(\\d+)$`);
  let max=0;
  inboxItems.forEach(it=>{
    const m=String(it.ticketId||'').match(re);
    if(m){
      const n=Number(m[1]||0);
      if(n>max) max=n;
    }
  });
  return `TKT-${ymd}-${String(max+1).padStart(3,'0')}`;
}
function getNowFromSettings(settings){
  if(settings.demoNow){
    const d=new Date(settings.demoNow);
    if(!isNaN(d.getTime())) return d;
  }
  return new Date();
}
function isAfterHours(settings){
  const bh=settings.businessHours||{};
  if(!bh.enabled) return false;
  const now=getNowFromSettings(settings);
  const day=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][now.getDay()];
  if((bh.closedDays||[]).includes(day)) return true;
  const cur=now.getHours()*60+now.getMinutes();
  const start=parseHM(bh.start||'10:00');
  const end=parseHM(bh.end||'19:00');
  return !(cur>=start&&cur<=end);
}
function latestUserMessage(item){
  const user=[...(item.messages||[])].reverse().find(m=>m.role==='user');
  return user?user.text:'';
}
function normalizeText(text){
  return String(text||'')
    .toLowerCase()
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s){return String.fromCharCode(s.charCodeAt(0)-65248);})
    .replace(/\s+/g,'');
}
function includesAny(text,words){
  return words.some(w=>text.includes(normalizeText(w)));
}
function uniqueWords(words){
  const set=new Set();
  const out=[];
  words.forEach(w=>{
    const k=String(w||'').trim();
    if(!k||set.has(k)) return;
    set.add(k);
    out.push(k);
  });
  return out;
}
function truncateText(text,maxLen){
  const s=String(text||'').trim();
  if(s.length<=maxLen) return s;
  return `${s.slice(0,Math.max(0,maxLen-1))}…`;
}
function summarizeComplaintText(messageText){
  const raw=String(messageText||'').trim();
  const firstSentence=(raw.split(/[。！？!\?\n]/).find(x=>String(x||'').trim())||raw).trim();
  const hitWords=uniqueWords(COMPLAINT_WORDS.filter(w=>normalizeText(raw).includes(normalizeText(w))));
  const angerHighWords=['最悪','返金','訴える','詐欺','怒','ひどい','対応が悪い'];
  const level=hitWords.some(w=>angerHighWords.includes(w))?'高':(hitWords.length>=2?'中':'低');
  const emotionText=hitWords.length?`感情語: ${hitWords.slice(0,3).join(' / ')}`:'感情語: 特定なし';
  const summary=truncateText(`${firstSentence}。${emotionText}`,200);
  return {summary,emotionLevel:level,recommendation:'翌営業日優先連絡'};
}
function hasCategoryHint(category,hints){
  const c=normalizeText(category);
  return hints.some(h=>c.includes(normalizeText(h)));
}
function classifyAfterHours(messageText,category){
  const t=normalizeText(messageText);
  const c=String(category||'');
  const isGeneralPriorityCategory=CATEGORY_GENERAL.includes(c);
  const hasReservationCategoryHint=hasCategoryHint(c,RESERVATION_CATEGORY_HINTS);
  const hasReservationStrong=includesAny(t,RESERVATION_WORDS_STRONG);
  const hasReservationWeak=includesAny(t,RESERVATION_WORDS_WEAK);
  if(includesAny(t,SAFETY_WORDS)) return 'safety';
  if(includesAny(t,COMPLAINT_WORDS)) return 'complaint';
  // fix: 施術説明/料金などは strong ヒットがない限り general を優先
  if(hasReservationStrong) return 'reservation';
  if(hasReservationWeak&&hasReservationCategoryHint) return 'reservation';
  if(isGeneralPriorityCategory) return 'general';
  if(hasReservationWeak||hasReservationCategoryHint) return 'reservation';
  return 'manual_review';
}
function confidenceByClassification(cls){
  if(cls==='safety') return 0.92;
  if(cls==='reservation') return 0.85;
  if(cls==='complaint') return 0.80;
  if(cls==='general') return 0.70;
  return 0.40;
}
function getClassification(item){
  return item.classification || (item.aiMeta&&item.aiMeta.classification) || 'manual_review';
}
function getClassPriority(item){
  const cls=getClassification(item);
  return CLASS_PRIORITY[cls] || CLASS_PRIORITY.manual_review;
}
function getStatusPriority(item){
  const status=String(item.status||'').trim();
  return STATUS_PRIORITY[status] || 2;
}
function toSortTimestamp(item){
  const raw=item.updatedAt || item.createdAt;
  if(!raw) return 0;
  if(typeof raw==='number') return raw;
  if(/^\d{2}:\d{2}$/.test(String(raw))){
    const now=new Date();
    const parts=String(raw).split(':').map(Number);
    now.setHours(parts[0]||0,parts[1]||0,0,0);
    return now.getTime();
  }
  const t=new Date(raw).getTime();
  return Number.isNaN(t)?0:t;
}
function sortByRiskPriority(a,b){
  // リスク優先ソートのため: classification -> status -> updatedAt(desc)
  const cp=getClassPriority(a)-getClassPriority(b);
  if(cp!==0) return cp;
  const sp=getStatusPriority(a)-getStatusPriority(b);
  if(sp!==0) return sp;
  return toSortTimestamp(b)-toSortTimestamp(a);
}
function normalizeFlags(item,classification){
  // updated: classification-based flag normalization (mutually exclusive)
  item.flags.reservation=classification==='reservation';
  item.flags.safetyAlert=classification==='safety';
  item.flags.complaint=classification==='complaint';
  item.flags.manualReview=classification==='manual_review';
  if(classification==='safety') item.flags.nextActionTag='至急対応';
  else if(classification==='reservation') item.flags.nextActionTag='翌営業日対応';
  else if(classification==='complaint') item.flags.nextActionTag='翌営業日優先';
  else if(classification==='manual_review') item.flags.nextActionTag='要確認';
  else item.flags.nextActionTag=item.flags.autoReplied?'自動返信済':'なし';
}

function processAfterHoursAutoReply(){
  const settings=loadSettings();
  const afterHoursMode=!!(settings.afterHoursMode&&settings.afterHoursMode.enabled);
  const afterHours=afterHoursMode?isAfterHours(settings):false;
  let changed=false;
  inboxItems.forEach(item=>{
    const prevAfter=!!item.flags.afterHours;
    item.flags.afterHours=afterHours;
    if(prevAfter!==afterHours) changed=true;
    const text=latestUserMessage(item);
    const classification=classifyAfterHours(text,item.category);
    normalizeFlags(item,classification);
    if(!item.aiMeta) item.aiMeta={};
    if(item.aiMeta.classification!==classification){item.aiMeta.classification=classification;changed=true;}
    const conf=confidenceByClassification(classification);
    if(Number(item.aiMeta.confidence)!==conf){item.aiMeta.confidence=conf;changed=true;}
    // safety は営業時間に関係なく自動チケット化して有人対応を必須化する
    if(classification==='safety'){
      if(!item.ticketCreated){
        item.ticketCreated=true;
        item.ticketId=item.ticketId||generateTicketId();
        changed=true;
      }
      if(item.ticketPriority!=='HIGH'){item.ticketPriority='HIGH';changed=true;}
      if(item.assignedTo!=='医療スタッフ'){item.assignedTo='医療スタッフ';changed=true;}
      if(item.ticketDepartment!=='医療チーム'){item.ticketDepartment='医療チーム';changed=true;}
      if(item.ticketSla!=='30分以内'){item.ticketSla='30分以内';changed=true;}
      if(item.status!=='未対応'){item.status='未対応';changed=true;}
    }
    if(classification==='complaint'){
      const complaintSummary=summarizeComplaintText(text);
      const prev=item.complaintSummary||{};
      if(prev.summary!==complaintSummary.summary||prev.emotionLevel!==complaintSummary.emotionLevel){
        item.complaintSummary={...complaintSummary,updatedAt:nowISO()};
        changed=true;
      }
    }else if(item.complaintSummary){
      delete item.complaintSummary;
      changed=true;
    }
    item.aiMeta.model='mock';
    if(!Array.isArray(item.aiMeta.citations)) item.aiMeta.citations=[];
    if(item.aiMeta.autoReplyAt==='-'){delete item.aiMeta.autoReplyAt;changed=true;}
    const already=item.flags.autoReplied||(item.aiMeta&&item.aiMeta.autoReplyAt);
    // fix: legacy data cleanup. non-general should not keep auto reply state.
    if(classification!=='general'&&(item.flags.autoReplied||item.aiMeta.autoReplyAt)){
      item.flags.autoReplied=false;
      delete item.aiMeta.autoReplyAt;
      changed=true;
    }
    if(!afterHoursMode||!afterHours) return;
    if(classification==='general'&&!already){
      const ai=callChatApi({messageText:text,category:item.category,itemId:item.id});
      item.messages.push({role:'assistant',text:ai.answerText,time:nowHHMM(),citations:ai.citations});
      item.flags.autoReplied=true;
      item.aiMeta.classification='general';
      item.aiMeta.confidence=ai.confidence||0.72;
      item.aiMeta.citations=ai.citations||[];
      item.aiMeta.autoReplyAt=nowISO();
      normalizeFlags(item,'general');
      item.updatedAt=nowISO();
      changed=true;
    // ②予約 / ③危険兆候 / ④クレームの返信生成は次実装で追加する
    }else if(classification!=='general'){
      item.flags.autoReplied=false;
      delete item.aiMeta.autoReplyAt;
      normalizeFlags(item,classification);
      changed=true;
      // TODO(次ステップ): ②予約 ③危険兆候 ④クレーム の返信生成はここで追加
    }
  });
  if(changed) saveInboxItems();
}

function filtered(){

  const to=dateToEl.value?new Date(dateToEl.value+'T23:59:59'):null;

    if(state.tab==='unread'&&!i.unread)return false;

    if(state.tab==='alert'&&!i.flags.safetyAlert)return false;

    if(state.category&&i.category!==state.category)return false;
    if(state.status&&i.status!==state.status)return false;
    if(from||to){
      const t=new Date(i.createdAt);
      if(from&&t<from)return false;
      if(to&&t>to)return false;
    }
    if(q){
      const text=[i.customerName,i.category,...(i.messages||[]).map(m=>m.text)].join(' ').toLowerCase();
      if(!text.includes(q)) return false;
    }
    return true;
  });

  const i=inboxItems.find(x=>x.id===state.selectedId);
  if(!i){detailRootEl.innerHTML='<div class="empty">問い合わせを選択してください。</div>';return;}
  const msgs=(i.messages||[]).map(m=>`<div class="msg ${m.role}"><div>${m.text}</div><div class="msg-time">${m.time||fmtTime(i.updatedAt)}</div>${m.citations?`<details class="citation"><summary>引用ソース</summary>${m.citations.map(c=>`<div class="citation-item"><strong>${c.source}</strong>: ${c.snippet}</div>`).join('')}</details>`:''}</div>`).join('');
  detailRootEl.innerHTML=`<div class="detail-head">
      <h3 class="customer-title">${i.customerName}</h3>
      <div class="customer-meta">${i.maskedContact}</div>
      <div class="customer-tags">
        <span class="badge b-cat">${i.customerTag||'一般'}</span>
        <span class="badge b-cat">カテゴリ: ${i.category}</span>
        <span class="badge ${badgeStatusCls(i.status)}">${i.status}</span>
        ${i.flags.afterHours?'<span class="badge b-after">🌙 営業時間外</span>':''}
        ${isAiResolved(i)?'<span class="badge b-auto">🤖 自動返信済</span>':''}
        ${i.flags.reservation?`<span class="badge b-ai">${i.reservationFormData?'🗓 仮受付（情報取得済）':'🗓 仮受付'}</span>`:''}
        ${i.flags.safetyAlert?'<span class="badge b-alert">🚨 安全アラート</span>':''}
        ${(getClassification(i)==='safety'&&i.ticketCreated)?'<span class="badge b-handoff">🔴 有人対応（緊急）</span>':''}
        ${i.flags.complaint?'<span class="badge b-handoff">⚠ クレーム（優先）</span>':''}
        ${(i.aiMeta&&i.aiMeta.classification==='manual_review')?'<span class="badge b-check">要確認</span>':''}
      </div>
      ${renderAICard(i)}
    </div>
    <div class="messages">${msgs}</div>
    <div class="actions">
      <div class="action-row">
        <button class="btn warn" id="handoffBtn" type="button">チケット化（有人対応へ）</button>
        <button class="btn" data-template="営業時間内に確認のうえご連絡します。">テンプレ返信: 受付</button>
      </div>
      <textarea id="replyBox" class="reply-box" placeholder="返信文を入力（モック）"></textarea>
      <div class="action-row" style="margin-top:10px;">
        <button class="btn primary" id="sendReplyBtn" type="button">スタッフ返信を送信</button>
        ${getClassification(i)==='safety'
          ?'<button class="btn danger" id="urgentStartBtn" type="button">至急対応を開始</button>'
          :'<button class="btn primary" id="doneBtn" type="button">完了にする</button>'}
        <button class="btn" id="reAutoBtn" type="button">自動返信を再実行（デモ）</button>
      </div>
    </div>`;
}
function bindList(){
  inboxListEl.querySelectorAll('.inbox-item').forEach(el=>el.addEventListener('click',()=>{
    state.selectedId=el.dataset.id;
    const t=inboxItems.find(x=>x.id===state.selectedId);
    if(t){t.unread=false;saveInboxItems();}
    renderAll();
  }));
}
function bindDetail(){
  const i=inboxItems.find(x=>x.id===state.selectedId);
  if(!i) return;
  const reply=document.getElementById('replyBox');
  detailRootEl.querySelectorAll('[data-template]').forEach(btn=>btn.addEventListener('click',()=>{reply.value=btn.dataset.template;reply.focus();}));
  const handoff=document.getElementById('handoffBtn');
  if(handoff) handoff.addEventListener('click',()=>{i.status='対応中';i.updatedAt=nowISO();saveInboxItems();renderAll();});
  const done=document.getElementById('doneBtn');
  const urgentStart=document.getElementById('urgentStartBtn');
  const reservationSaveBtn=document.getElementById('reservationSaveBtn');
  if(urgentStart) urgentStart.addEventListener('click',()=>{
    i.status='対応中';
    i.updatedAt=nowISO();
    i.ticketCreated=true;
    i.ticketId=i.ticketId||generateTicketId();
    i.ticketPriority='HIGH';
    i.assignedTo='医療スタッフ';
    i.ticketDepartment='医療チーム';
    i.ticketSla='30分以内';
    saveInboxItems();
    renderAll();
  });
  if(done) done.addEventListener('click',()=>{i.status='完了';i.unread=false;i.updatedAt=nowISO();saveInboxItems();renderAll();});
  if(reservationSaveBtn) reservationSaveBtn.addEventListener('click',()=>{
    const preferredDate=(document.getElementById('reservationDate')||{}).value||'';
    const preferredTime=(document.getElementById('reservationTime')||{}).value||'';
    const procedure=(document.getElementById('reservationProcedure')||{}).value||'';
    const visitType=((detailRootEl.querySelector('input[name="reservationVisitType"]:checked')||{}).value)||'初診';
    const note=(document.getElementById('reservationNote')||{}).value||'';
    i.reservationFormData={preferredDate,preferredTime,procedure,visitType,note,savedAt:nowISO()};
    i.status='仮受付完了';
    i.updatedAt=nowISO();
    saveInboxItems();
    renderAll();
  });
  const send=document.getElementById('sendReplyBtn');
  if(send) send.addEventListener('click',()=>{
    const text=(reply.value||'').trim();
    if(!text) return;
    i.messages.push({role:'staff',text,time:nowHHMM()});
    i.status=i.status==='未対応'?'対応中':i.status;
    i.updatedAt=nowISO();
    reply.value='';
    saveInboxItems();
    renderAll();
  });
  const reAuto=document.getElementById('reAutoBtn');
  if(reAuto) reAuto.addEventListener('click',()=>{
    i.flags.autoReplied=false;
    if(!i.aiMeta) i.aiMeta={};
    delete i.aiMeta.autoReplyAt;
    processAfterHoursAutoReply();
    saveInboxItems();
    renderAll();
  });
}
function renderAll(){renderList();renderDetail();bindList();bindDetail();}
function closeAllDropdowns(){
  ['searchDropdown','mailDropdown','notifyDropdown'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.remove('active');
  });
  activeDropdown='';
}
function toggleDropdown(type){
  const map={search:'searchDropdown',mail:'mailDropdown',notify:'notifyDropdown'};
  const next=map[type];
  if(!next) return;
  const isOpen=activeDropdown===next;
  closeAllDropdowns();
  if(!isOpen){
    const panel=document.getElementById(next);
    if(panel) panel.classList.add('active');
    activeDropdown=next;
    if(type==='search') headerSearchEl.focus();
  }
}

tabContainerEl.addEventListener('click',e=>{
  const t=e.target.closest('[data-tab]');
  if(!t) return;
  state.tab=t.dataset.tab;
  tabContainerEl.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  t.classList.add('active');
  renderAll();
});
categoryFilterEl.addEventListener('change',()=>{state.category=categoryFilterEl.value;renderAll();});
statusFilterEl.addEventListener('change',()=>{state.status=statusFilterEl.value;renderAll();});
headerSearchEl.addEventListener('input',()=>{state.query=headerSearchEl.value;renderAll();});
document.getElementById('resetBtn').addEventListener('click',()=>{
  state.tab='all';state.category='';state.status='';state.query='';
  categoryFilterEl.value='';statusFilterEl.value='';headerSearchEl.value='';dateFromEl.value='';dateToEl.value='';
  tabContainerEl.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  tabContainerEl.querySelector('[data-tab="all"]').classList.add('active');
  renderAll();
});

const searchBtn=document.getElementById('searchBtn');
const mailBtn=document.getElementById('mailBtn');
const notifyBtn=document.getElementById('notifyBtn');
const markAllReadBtn=document.getElementById('markAllReadBtn');
searchBtn.addEventListener('click',(e)=>{e.stopPropagation();toggleDropdown('search');});
mailBtn.addEventListener('click',(e)=>{e.stopPropagation();toggleDropdown('mail');});
notifyBtn.addEventListener('click',(e)=>{e.stopPropagation();toggleDropdown('notify');});
headerSearchEl.addEventListener('keydown',(e)=>{
  if(e.key==='Enter'){
    console.log('header search:', headerSearchEl.value||'');
  }
});
markAllReadBtn.addEventListener('click',()=>{console.log('notifications marked as read (demo)');});
['searchDropdown','mailDropdown','notifyDropdown'].forEach((id)=>{
  const panel=document.getElementById(id);
  if(panel) panel.addEventListener('click',(e)=>e.stopPropagation());
});
document.addEventListener('click',()=>closeAllDropdowns());
const mt=document.getElementById('menuToggle'),sb=document.getElementById('sidebar'),ov=document.getElementById('overlay');
mt.addEventListener('click',()=>{sb.classList.toggle('open');ov.classList.toggle('show');});
ov.addEventListener('click',()=>{sb.classList.remove('open');ov.classList.remove('show');});
window.addEventListener('resize',()=>{if(window.innerWidth>992){sb.classList.remove('open');ov.classList.remove('show');}});

if(window.StaffSettings&&window.StaffSettings.renderSidebarUser){window.StaffSettings.renderSidebarUser(document);}
renderAll();
</script>
</body>
</html>
