<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Clinicflow AI</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<main class="login-page">
    <section class="login-card">
        <h1>Clinicflow AI</h1>
        <p class="subtitle">Please sign in.</p>

        <p class="message error" th:if="${param.error}">Invalid username or password.</p>
        <p class="message success" th:if="${param.logout}">You have been logged out.</p>
        <p class="message success" sec:authorize="isAuthenticated()">You are already signed in.</p>

        <form th:action="@{/login}" method="post">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button type="submit">Login</button>
        </form>
    </section>
</main>
</body>
</html>
